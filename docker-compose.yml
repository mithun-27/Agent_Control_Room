version: '3.8'

services:
  db:
    image: postgres:15
    container_name: agent_control_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_control
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: agent_control_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
